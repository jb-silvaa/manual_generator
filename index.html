<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual Generator — DocShot</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header>
    <!-- Logo + Proyecto -->
    <div class="header-logo-group">
      <div class="logo">
        <div class="logo-dot"></div>
        DocShot
      </div>
      <div class="header-project-btns">
        <button class="btn btn-ghost btn-icon" onclick="saveProject()" title="Guardar proyecto">💾</button>
        <button class="btn btn-ghost btn-icon" onclick="loadProject()" title="Cargar proyecto">📂</button>
      </div>
    </div>

    <!-- Metadatos del manual -->
    <div class="header-center">
      <input class="meta-input" id="manualTitle" placeholder="Título del manual…" style="width:220px;" value="Manual de Usuario">
      <input class="meta-input" id="manualVersion" placeholder="v1.0" style="width:70px;" value="v1.0">
    </div>

    <!-- Acciones principales -->
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="clearAll()">✕ Limpiar</button>
      <button class="btn btn-blue" onclick="openPreview()">👁 Vista previa</button>
      <div class="export-dropdown" id="exportDropdown">
        <button class="btn btn-primary" onclick="toggleExportMenu()">↓ Exportar ▾</button>
        <div class="export-menu" id="exportMenu">
          <button class="export-item" onclick="exportHTML(); closeExportMenu()">
            <span class="export-item-icon">🌐</span>
            <span>
              <strong>HTML</strong>
              <small>Página web interactiva</small>
            </span>
          </button>
          <button class="export-item" onclick="exportPDF(); closeExportMenu()">
            <span class="export-item-icon">📄</span>
            <span>
              <strong>PDF</strong>
              <small>Documento con portada</small>
            </span>
          </button>
          <button class="export-item" onclick="exportMarkdown(); closeExportMenu()">
            <span class="export-item-icon">✍️</span>
            <span>
              <strong>Markdown</strong>
              <small>Para GitHub / Notion / Obsidian</small>
            </span>
          </button>
          <div class="export-menu-divider"></div>
          <button class="export-item" onclick="exportDOCX(); closeExportMenu()">
            <span class="export-item-icon">📝</span>
            <span>
              <strong>Word (.docx)</strong>
              <small>Microsoft Word / LibreOffice</small>
            </span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- LEFT SIDEBAR — screenshots list -->
    <aside class="sidebar-left">
      <div class="sidebar-header">
        <span class="sidebar-title">Pantallas</span>
        <span class="version-badge" id="screenCount">0 pantallas</span>
      </div>
      <div class="screens-list" id="screensList"></div>
      <label class="drop-zone" id="dropZone" for="fileInput">
        <span class="drop-zone-icon">📷</span>
        <strong>Agregar capturas</strong><br>
        Arrastra imágenes aquí<br>o haz clic para seleccionar
      </label>
      <input type="file" id="fileInput" accept="image/*" multiple>
      <input type="file" id="projectFileInput" accept=".json">
    </aside>

    <!-- CENTER — canvas area -->
    <section class="canvas-area" id="canvasArea">
      <div class="canvas-toolbar" id="canvasToolbar" style="display:none">
        <div class="pin-colors" id="pinColors">
          <span class="color-label">Color:</span>
        </div>
        <div class="toolbar-divider"></div>
        <button class="btn btn-ghost" id="btnAddPin" onclick="togglePinMode()" style="font-size:11px;padding:5px 12px;">
          📍 Añadir marcador
        </button>
        <button class="btn btn-ghost" onclick="clearPins()" style="font-size:11px;padding:5px 12px;color:var(--danger);">
          🗑 Limpiar marcadores
        </button>
        <div class="mode-indicator">
          <div class="mode-dot" id="modeDot"></div>
          <span id="modeText">modo selección</span>
        </div>
      </div>
      <div class="canvas-empty" id="canvasEmpty">
        <span class="canvas-empty-icon">🖼</span>
        <strong style="color:var(--text2);font-size:16px;">Ninguna pantalla seleccionada</strong>
        Agrega capturas de pantalla en el panel izquierdo<br>y haz clic sobre ellas para editar
      </div>
      <div class="image-wrapper" id="imageWrapper" style="display:none">
        <img id="mainImage" class="screen-image" draggable="false" alt="">
      </div>
    </section>

    <!-- RIGHT SIDEBAR — annotations -->
    <aside class="sidebar-right">
      <div class="sidebar-header">
        <span class="sidebar-title">Anotaciones</span>
        <span class="version-badge" id="annCount">0</span>
      </div>
      <div class="section-meta-area">
        <input class="section-title-input" id="sectionTitle" placeholder="Título de esta sección…">
        <textarea class="screen-desc-input" id="screenDescription" placeholder="Descripción general de esta pantalla… (opcional)"></textarea>
      </div>
      <div class="annotations-list" id="annotationsList">
        <div class="empty-annotations">Selecciona una pantalla y coloca marcadores haciendo clic sobre la imagen.</div>
      </div>
    </aside>
  </main>

  <!-- PREVIEW MODAL -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Vista previa del manual</span>
        <button class="btn btn-ghost" onclick="closePreview()" style="padding:5px 10px;">✕</button>
      </div>
      <div class="modal-body">
        <div id="manualPreview"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closePreview()">Cerrar</button>
        <div class="export-dropdown" id="exportDropdownModal">
          <button class="btn btn-primary" onclick="toggleExportMenu('exportDropdownModal')">↓ Exportar ▾</button>
          <div class="export-menu" id="exportMenuModal">
            <button class="export-item" onclick="exportHTML(); closeExportMenu('exportDropdownModal')">
              <span class="export-item-icon">🌐</span>
              <span><strong>HTML</strong><small>Página web interactiva</small></span>
            </button>
            <button class="export-item" onclick="exportPDF(); closeExportMenu('exportDropdownModal')">
              <span class="export-item-icon">📄</span>
              <span><strong>PDF</strong><small>Documento con portada</small></span>
            </button>
            <button class="export-item" onclick="exportMarkdown(); closeExportMenu('exportDropdownModal')">
              <span class="export-item-icon">✍️</span>
              <span><strong>Markdown</strong><small>Para GitHub / Notion / Obsidian</small></span>
            </button>
            <div class="export-menu-divider"></div>
            <button class="export-item" onclick="exportDOCX(); closeExportMenu('exportDropdownModal')">
              <span class="export-item-icon">📝</span>
              <span><strong>Word (.docx)</strong><small>Microsoft Word / LibreOffice</small></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/scripts.js"></script>
</body>

</html>
