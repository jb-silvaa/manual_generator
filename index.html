<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Generator — DocShot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e11;
    --surface: #141519;
    --surface2: #1c1d23;
    --surface3: #24252e;
    --border: #2a2b35;
    --accent: #4ade80;
    --accent2: #3b82f6;
    --accent3: #f59e0b;
    --text: #e8e9f0;
    --text2: #9899a8;
    --text3: #5a5b6a;
    --danger: #ef4444;
    --pin-size: 28px;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* BUTTONS */
  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-ghost:hover { background: var(--surface3); color: var(--text); border-color: var(--border); }
  .btn-primary { background: var(--accent); color: #0d0e11; border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover { background: #22c55e; }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: rgba(239,68,68,0.1); }
  .btn-blue { background: var(--accent2); color: white; border-color: var(--accent2); font-weight: 600; }
  .btn-blue:hover { background: #2563eb; }

  /* MAIN LAYOUT */
  main {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    height: calc(100vh - 56px);
    overflow: hidden;
  }

  /* SIDEBAR LEFT — screenshots list */
  .sidebar-left {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .screens-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .screens-list::-webkit-scrollbar { width: 4px; }
  .screens-list::-webkit-scrollbar-track { background: transparent; }
  .screens-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .screen-item {
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 6px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.15s;
    background: var(--surface2);
    position: relative;
  }
  .screen-item:hover { border-color: var(--accent2); }
  .screen-item.active { border-color: var(--accent); background: rgba(74,222,128,0.05); }
  .screen-thumb {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
    background: var(--surface3);
  }
  .screen-info {
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .screen-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 140px;
  }
  .screen-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: var(--surface3);
    color: var(--text3);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .screen-item.active .screen-badge { background: rgba(74,222,128,0.15); color: var(--accent); }
  .screen-delete {
    position: absolute;
    top: 6px; right: 6px;
    width: 22px; height: 22px;
    background: rgba(239,68,68,0.8);
    border: none;
    border-radius: 4px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    transition: 0.15s;
  }
  .screen-item:hover .screen-delete { display: flex; }

  .drop-zone {
    margin: 8px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.6;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent2);
    background: rgba(59,130,246,0.05);
    color: var(--text2);
  }
  .drop-zone-icon { font-size: 22px; display: block; margin-bottom: 6px; }
  #fileInput { display: none; }

  /* CENTER — canvas area */
  .canvas-area {
    background: var(--bg);
    overflow: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .canvas-area::-webkit-scrollbar { width: 6px; height: 6px; }
  .canvas-area::-webkit-scrollbar-track { background: transparent; }
  .canvas-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .canvas-toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    width: 100%;
    padding: 10px 16px;
    background: rgba(13,14,17,0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .mode-indicator {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    display: flex; align-items: center; gap: 6px;
    margin-left: auto;
    color: var(--text3);
  }
  .mode-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .mode-dot.active-pin { background: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .canvas-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
    font-size: 14px;
    padding: 40px;
    text-align: center;
  }
  .canvas-empty-icon { font-size: 48px; opacity: 0.3; }

  .image-wrapper {
    position: relative;
    display: inline-block;
    margin: 20px;
    border-radius: 8px;
    overflow: visible;
    box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.4);
  }
  .screen-image {
    display: block;
    max-width: 100%;
    border-radius: 8px;
    user-select: none;
    cursor: crosshair;
  }
  .screen-image.mode-select { cursor: default; }

  /* PINS */
  .pin {
    position: absolute;
    width: var(--pin-size);
    height: var(--pin-size);
    border-radius: 50% 50% 50% 0;
    transform: translate(-50%, -100%) rotate(-45deg);
    cursor: pointer;
    z-index: 20;
    transition: transform 0.15s, filter 0.15s;
    border: 2px solid rgba(0,0,0,0.3);
  }
  .pin:hover { transform: translate(-50%, -100%) rotate(-45deg) scale(1.2); filter: brightness(1.2); }
  .pin.selected { filter: brightness(1.3); box-shadow: 0 0 0 3px rgba(255,255,255,0.3); }
  .pin-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: white;
    line-height: 1;
    pointer-events: none;
  }

  /* SIDEBAR RIGHT — annotations */
  .sidebar-right {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .annotations-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .annotations-list::-webkit-scrollbar { width: 4px; }
  .annotations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .annotation-card {
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 10px;
    margin-bottom: 6px;
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .annotation-card:hover { border-color: var(--accent2); }
  .annotation-card.selected { border-color: var(--accent); background: rgba(74,222,128,0.05); }
  .annotation-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .annotation-pin-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: white;
  }
  .annotation-label-input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    background: transparent;
    border: none;
    color: var(--text);
    width: 100%;
    outline: none;
    padding: 0;
  }
  .annotation-label-input::placeholder { color: var(--text3); }
  .annotation-desc-input {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    width: 100%;
    padding: 7px 9px;
    resize: vertical;
    min-height: 56px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .annotation-desc-input:focus { border-color: var(--accent2); }
  .annotation-desc-input::placeholder { color: var(--text3); }
  .annotation-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 6px;
  }
  .del-ann-btn {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: 0.15s;
    font-family: 'IBM Plex Mono', monospace;
  }
  .del-ann-btn:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

  .empty-annotations {
    padding: 24px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.6;
  }

  /* SECTION TITLE */
  .section-title-area {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title-input {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    width: 100%;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .section-title-input:focus { border-color: var(--accent2); }
  .section-title-input::placeholder { color: var(--text3); }

  /* COLOR PICKER for pins */
  .pin-colors { display: flex; gap: 5px; align-items: center; }
  .color-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.15s;
  }
  .color-dot:hover, .color-dot.selected { border-color: white; transform: scale(1.2); }

  /* EXPORT PREVIEW MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 860px;
    max-width: 95vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* MANUAL PREVIEW STYLES */
  #manualPreview {
    font-family: 'IBM Plex Sans', sans-serif;
    color: #1a1a2e;
    line-height: 1.6;
  }
  .preview-title {
    font-size: 26px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .preview-meta {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 32px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .preview-section { margin-bottom: 40px; }
  .preview-section-title {
    font-size: 16px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e2e8f0;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; align-items: center; gap: 8px;
  }
  .preview-section-num {
    background: #0f172a;
    color: white;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .preview-img-container { position: relative; display: inline-block; margin-bottom: 16px; max-width: 100%; }
  .preview-img-container img { max-width: 100%; border-radius: 6px; border: 1px solid #e2e8f0; display: block; }
  .preview-pin {
    position: absolute;
    width: 24px; height: 24px;
    border-radius: 50% 50% 50% 0;
    transform: translate(-50%, -100%) rotate(-45deg);
    border: 1.5px solid rgba(0,0,0,0.2);
  }
  .preview-pin-num {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    font-size: 10px;
    font-weight: 700;
    color: white;
    font-family: 'IBM Plex Mono', monospace;
  }
  .preview-annotations { margin-top: 4px; }
  .preview-ann-item {
    display: flex;
    gap: 10px;
    padding: 8px 12px;
    background: #f8fafc;
    border-left: 3px solid #e2e8f0;
    border-radius: 0 6px 6px 0;
    margin-bottom: 6px;
    align-items: flex-start;
  }
  .preview-ann-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 1px;
  }
  .preview-ann-content {}
  .preview-ann-label { font-size: 12px; font-weight: 600; color: #0f172a; font-family: 'IBM Plex Mono', monospace; }
  .preview-ann-desc { font-size: 13px; color: #475569; margin-top: 2px; }

  /* manual title input area */
  .manual-meta-bar {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .meta-input {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
    flex: 1;
  }
  .meta-input:focus { border-color: var(--accent2); }
  .meta-input::placeholder { color: var(--text3); }

  .version-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    background: var(--surface3);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  /* drag reorder handle */
  .drag-handle {
    color: var(--text3);
    cursor: grab;
    padding: 2px 4px;
    font-size: 14px;
    user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    DocShot
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="manual-meta-bar" style="padding:0;background:transparent;border:none;gap:8px;">
      <input class="meta-input" id="manualTitle" placeholder="Título del manual…" style="width:220px;flex:none;" value="Manual de Usuario">
      <input class="meta-input" id="manualVersion" placeholder="v1.0" style="width:70px;flex:none;" value="v1.0">
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="clearAll()">✕ Limpiar todo</button>
    <button class="btn btn-blue" onclick="openPreview()">👁 Vista previa</button>
    <button class="btn btn-primary" onclick="exportHTML()">↓ Exportar HTML</button>
  </div>
</header>

<main>
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar-left">
    <div class="sidebar-header">
      <span class="sidebar-title">Pantallas</span>
      <span class="version-badge" id="screenCount">0 pantallas</span>
    </div>
    <div class="screens-list" id="screensList"></div>
    <label class="drop-zone" id="dropZone" for="fileInput">
      <span class="drop-zone-icon">📂</span>
      <strong>Agregar capturas</strong><br>
      Arrastra imágenes aquí<br>o haz clic para seleccionar
    </label>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </aside>

  <!-- CENTER CANVAS -->
  <section class="canvas-area" id="canvasArea">
    <div class="canvas-toolbar" id="canvasToolbar" style="display:none">
      <div class="pin-colors" id="pinColors">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-right:2px;">Color:</span>
      </div>
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
      <button class="btn btn-ghost" id="btnAddPin" onclick="togglePinMode()" style="font-size:11px;padding:5px 12px;">
        📍 Añadir marcador
      </button>
      <button class="btn btn-ghost" onclick="clearPins()" style="font-size:11px;padding:5px 12px;color:var(--danger);">
        🗑 Limpiar marcadores
      </button>
      <div class="mode-indicator">
        <div class="mode-dot" id="modeDot"></div>
        <span id="modeText" style="font-family:'IBM Plex Mono',monospace;font-size:11px;">modo selección</span>
      </div>
    </div>
    <div class="canvas-empty" id="canvasEmpty">
      <span class="canvas-empty-icon">🖼</span>
      <strong style="color:var(--text2);font-size:16px;">Ninguna pantalla seleccionada</strong>
      Agrega capturas de pantalla en el panel izquierdo<br>y haz clic sobre ellas para editar
    </div>
    <div class="image-wrapper" id="imageWrapper" style="display:none">
      <img id="mainImage" class="screen-image" draggable="false">
    </div>
  </section>

  <!-- RIGHT SIDEBAR -->
  <aside class="sidebar-right">
    <div class="sidebar-header">
      <span class="sidebar-title">Anotaciones</span>
      <span class="version-badge" id="annCount">0</span>
    </div>
    <div class="section-title-area">
      <input class="section-title-input" id="sectionTitle" placeholder="Título de esta sección…">
    </div>
    <div class="annotations-list" id="annotationsList">
      <div class="empty-annotations">Selecciona una pantalla y coloca marcadores haciendo clic sobre la imagen.</div>
    </div>
  </aside>
</main>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="previewModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Vista previa del manual</span>
      <button class="btn btn-ghost" onclick="closePreview()" style="padding:5px 10px;">✕</button>
    </div>
    <div class="modal-body">
      <div id="manualPreview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePreview()">Cerrar</button>
      <button class="btn btn-primary" onclick="exportHTML()">↓ Exportar como HTML</button>
    </div>
  </div>
</div>

<script>
// ============================
// STATE
// ============================
const PIN_COLORS = ['#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4'];
let screens = []; // [{id, name, dataUrl, sectionTitle, annotations:[{id,x%,y%,label,desc,color}]}]
let activeScreenId = null;
let pinMode = false;
let selectedPinColor = PIN_COLORS[0];
let selectedAnnotationId = null;
let pinCounter = {};

function getScreen(id) { return screens.find(s => s.id === id); }
function getActive() { return getScreen(activeScreenId); }

// ============================
// FILE UPLOAD
// ============================
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');

fileInput.addEventListener('change', e => loadFiles(e.target.files));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  loadFiles(e.dataTransfer.files);
});

function loadFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const id = 'scr_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      const name = file.name.replace(/\.[^.]+$/, '');
      screens.push({ id, name, dataUrl: e.target.result, sectionTitle: name, annotations: [] });
      pinCounter[id] = 0;
      renderScreensList();
      if (!activeScreenId) selectScreen(id);
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
}

// ============================
// SCREENS LIST
// ============================
function renderScreensList() {
  const list = document.getElementById('screensList');
  document.getElementById('screenCount').textContent = screens.length + ' pantalla' + (screens.length !== 1 ? 's' : '');
  if (screens.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = screens.map(s => `
    <div class="screen-item ${s.id === activeScreenId ? 'active' : ''}" onclick="selectScreen('${s.id}')">
      <img class="screen-thumb" src="${s.dataUrl}">
      <div class="screen-info">
        <span class="screen-name" title="${s.name}">${s.name}</span>
        <span class="screen-badge">${s.annotations.length} 📍</span>
      </div>
      <button class="screen-delete" onclick="event.stopPropagation();deleteScreen('${s.id}')">✕</button>
    </div>
  `).join('');
}

function deleteScreen(id) {
  screens = screens.filter(s => s.id !== id);
  if (activeScreenId === id) {
    activeScreenId = screens.length ? screens[0].id : null;
    if (activeScreenId) selectScreen(activeScreenId);
    else showEmpty();
  }
  renderScreensList();
}

function selectScreen(id) {
  activeScreenId = id;
  pinMode = false;
  selectedAnnotationId = null;
  renderScreensList();
  renderCanvas();
  renderAnnotations();
  document.getElementById('sectionTitle').value = getActive()?.sectionTitle || '';
}

// ============================
// CANVAS
// ============================
function showEmpty() {
  document.getElementById('canvasEmpty').style.display = 'flex';
  document.getElementById('imageWrapper').style.display = 'none';
  document.getElementById('canvasToolbar').style.display = 'none';
  document.getElementById('annotationsList').innerHTML = '<div class="empty-annotations">Selecciona una pantalla y coloca marcadores haciendo clic sobre la imagen.</div>';
  document.getElementById('annCount').textContent = '0';
}

function renderCanvas() {
  const screen = getActive();
  if (!screen) { showEmpty(); return; }

  document.getElementById('canvasEmpty').style.display = 'none';
  document.getElementById('imageWrapper').style.display = 'inline-block';
  document.getElementById('canvasToolbar').style.display = 'flex';

  const img = document.getElementById('mainImage');
  img.src = screen.dataUrl;
  img.onclick = handleImageClick;
  updatePinModeUI();
  renderPins();
  renderColorPicker();
}

function renderColorPicker() {
  const container = document.getElementById('pinColors');
  container.innerHTML = '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:var(--text3);margin-right:2px;">Color:</span>';
  PIN_COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === selectedPinColor ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => { selectedPinColor = c; renderColorPicker(); };
    container.appendChild(d);
  });
}

function handleImageClick(e) {
  if (!pinMode) return;
  const screen = getActive();
  if (!screen) return;
  const rect = e.target.getBoundingClientRect();
  const xPct = ((e.clientX - rect.left) / rect.width) * 100;
  const yPct = ((e.clientY - rect.top) / rect.height) * 100;
  pinCounter[screen.id] = (pinCounter[screen.id] || 0) + 1;
  const ann = {
    id: 'ann_' + Date.now(),
    x: xPct,
    y: yPct,
    label: 'Elemento ' + pinCounter[screen.id],
    desc: '',
    color: selectedPinColor,
    num: pinCounter[screen.id]
  };
  screen.annotations.push(ann);
  selectedAnnotationId = ann.id;
  renderPins();
  renderAnnotations();
  renderScreensList();
  // focus textarea
  setTimeout(() => {
    const el = document.getElementById('desc_' + ann.id);
    if (el) el.focus();
  }, 50);
}

function renderPins() {
  const wrapper = document.getElementById('imageWrapper');
  // remove old pins
  wrapper.querySelectorAll('.pin').forEach(p => p.remove());
  const screen = getActive();
  if (!screen) return;
  screen.annotations.forEach((ann, i) => {
    const pin = document.createElement('div');
    pin.className = 'pin' + (ann.id === selectedAnnotationId ? ' selected' : '');
    pin.style.cssText = `left:${ann.x}%;top:${ann.y}%;background:${ann.color};`;
    pin.innerHTML = `<span class="pin-number">${ann.num}</span>`;
    pin.onclick = (e) => { e.stopPropagation(); selectedAnnotationId = ann.id; renderPins(); renderAnnotations(); };
    pin.title = ann.label;
    wrapper.appendChild(pin);
  });
}

function togglePinMode() {
  pinMode = !pinMode;
  updatePinModeUI();
  const img = document.getElementById('mainImage');
  img.classList.toggle('mode-select', !pinMode);
}

function updatePinModeUI() {
  const btn = document.getElementById('btnAddPin');
  const dot = document.getElementById('modeDot');
  const txt = document.getElementById('modeText');
  if (pinMode) {
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'var(--accent)';
    dot.classList.add('active-pin');
    txt.textContent = 'modo marcador activo';
  } else {
    btn.style.color = '';
    btn.style.borderColor = '';
    dot.classList.remove('active-pin');
    txt.textContent = 'modo selección';
  }
  const img = document.getElementById('mainImage');
  if (img) img.classList.toggle('mode-select', !pinMode);
}

function clearPins() {
  const screen = getActive();
  if (!screen) return;
  screen.annotations = [];
  pinCounter[screen.id] = 0;
  selectedAnnotationId = null;
  renderPins();
  renderAnnotations();
  renderScreensList();
}

// ============================
// ANNOTATIONS PANEL
// ============================
function renderAnnotations() {
  const screen = getActive();
  const list = document.getElementById('annotationsList');
  const count = document.getElementById('annCount');
  if (!screen || screen.annotations.length === 0) {
    list.innerHTML = '<div class="empty-annotations">Activa el modo marcador y haz clic en la imagen para agregar anotaciones.</div>';
    count.textContent = '0';
    return;
  }
  count.textContent = screen.annotations.length;
  list.innerHTML = screen.annotations.map(ann => `
    <div class="annotation-card ${ann.id === selectedAnnotationId ? 'selected' : ''}" onclick="selectAnnotation('${ann.id}')">
      <div class="annotation-header">
        <div class="annotation-pin-dot" style="background:${ann.color}">${ann.num}</div>
        <input class="annotation-label-input" id="lbl_${ann.id}" value="${escHtml(ann.label)}"
          placeholder="Nombre del elemento…"
          oninput="updateAnnotation('${ann.id}','label',this.value)"
          onclick="event.stopPropagation()">
      </div>
      <textarea class="annotation-desc-input" id="desc_${ann.id}"
        placeholder="Describe la funcionalidad o acción de este elemento…"
        oninput="updateAnnotation('${ann.id}','desc',this.value)"
        onclick="event.stopPropagation()">${escHtml(ann.desc)}</textarea>
      <div class="annotation-actions">
        <button class="del-ann-btn" onclick="event.stopPropagation();deleteAnnotation('${ann.id}')">✕ eliminar</button>
      </div>
    </div>
  `).join('');
  // scroll selected into view
  if (selectedAnnotationId) {
    const card = list.querySelector('.annotation-card.selected');
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function selectAnnotation(id) {
  selectedAnnotationId = id;
  renderPins();
  renderAnnotations();
}

function updateAnnotation(id, field, value) {
  const screen = getActive();
  if (!screen) return;
  const ann = screen.annotations.find(a => a.id === id);
  if (ann) ann[field] = value;
  if (field === 'label') renderPins();
}

function deleteAnnotation(id) {
  const screen = getActive();
  if (!screen) return;
  screen.annotations = screen.annotations.filter(a => a.id !== id);
  if (selectedAnnotationId === id) selectedAnnotationId = null;
  renderPins();
  renderAnnotations();
  renderScreensList();
}

// section title
document.getElementById('sectionTitle').addEventListener('input', function() {
  const screen = getActive();
  if (screen) screen.sectionTitle = this.value;
});

// ============================
// EXPORT / PREVIEW
// ============================
function buildManualHTML(forExport = false) {
  const title = document.getElementById('manualTitle').value || 'Manual de Usuario';
  const version = document.getElementById('manualVersion').value || 'v1.0';
  const date = new Date().toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' });

  const sectionsHTML = screens.map((s, idx) => {
    const annsHTML = s.annotations.map(ann => `
      <div class="preview-ann-item">
        <div class="preview-ann-num" style="background:${ann.color}">${ann.num}</div>
        <div class="preview-ann-content">
          <div class="preview-ann-label">${escHtml(ann.label)}</div>
          ${ann.desc ? `<div class="preview-ann-desc">${escHtml(ann.desc)}</div>` : ''}
        </div>
      </div>`).join('');

    const pinsHTML = s.annotations.map(ann => `
      <div class="preview-pin" style="left:${ann.x}%;top:${ann.y}%;background:${ann.color};width:24px;height:24px;position:absolute;border-radius:50% 50% 50% 0;transform:translate(-50%,-100%) rotate(-45deg);border:1.5px solid rgba(0,0,0,0.2);">
        <div class="preview-pin-num" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);font-size:10px;font-weight:700;color:white;font-family:monospace;">${ann.num}</div>
      </div>`).join('');

    return `
      <div class="preview-section">
        <div class="preview-section-title">
          <span class="preview-section-num">${String(idx+1).padStart(2,'0')}</span>
          ${escHtml(s.sectionTitle || s.name)}
        </div>
        <div class="preview-img-container" style="position:relative;display:inline-block;max-width:100%;">
          <img src="${s.dataUrl}" style="max-width:100%;border-radius:6px;border:1px solid #e2e8f0;display:block;">
          ${pinsHTML}
        </div>
        ${s.annotations.length ? `<div class="preview-annotations">${annsHTML}</div>` : ''}
      </div>`;
  }).join('');

  return `
    ${forExport ? `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${escHtml(title)}</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Segoe UI',sans-serif;background:#f8fafc;color:#1a1a2e;padding:40px 20px;max-width:900px;margin:0 auto}
      .preview-title{font-size:28px;font-weight:700;color:#0f172a;margin-bottom:6px;font-family:monospace}
      .preview-meta{font-size:12px;color:#64748b;margin-bottom:36px;font-family:monospace}
      .preview-section{margin-bottom:48px;background:white;border-radius:10px;padding:24px;border:1px solid #e2e8f0}
      .preview-section-title{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #e2e8f0;font-family:monospace;display:flex;align-items:center;gap:8px}
      .preview-section-num{background:#0f172a;color:white;font-size:11px;padding:2px 8px;border-radius:4px}
      .preview-img-container{position:relative;display:inline-block;margin-bottom:16px;max-width:100%}
      .preview-img-container img{max-width:100%;border-radius:6px;border:1px solid #e2e8f0;display:block}
      .preview-pin{position:absolute}
      .preview-pin-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);font-size:10px;font-weight:700;color:white;font-family:monospace}
      .preview-annotations{margin-top:8px}
      .preview-ann-item{display:flex;gap:10px;padding:8px 12px;background:#f8fafc;border-left:3px solid #e2e8f0;border-radius:0 6px 6px 0;margin-bottom:6px;align-items:flex-start}
      .preview-ann-num{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;font-family:monospace;margin-top:1px}
      .preview-ann-label{font-size:12px;font-weight:600;color:#0f172a;font-family:monospace}
      .preview-ann-desc{font-size:13px;color:#475569;margin-top:2px}
    </style></head><body>` : ''}
    <div id="manualPreview" style="${forExport?'':''}">
      <div class="preview-title">${escHtml(title)}</div>
      <div class="preview-meta">Versión: ${escHtml(version)} · Generado: ${date} · ${screens.length} sección(es)</div>
      ${sectionsHTML}
    </div>
    ${forExport ? '</body></html>' : ''}
  `;
}

function openPreview() {
  if (screens.length === 0) { alert('Agrega al menos una pantalla primero.'); return; }
  document.getElementById('manualPreview').innerHTML = buildManualHTML(false);
  document.getElementById('previewModal').classList.add('open');
}
function closePreview() {
  document.getElementById('previewModal').classList.remove('open');
}

function exportHTML() {
  if (screens.length === 0) { alert('Agrega al menos una pantalla primero.'); return; }
  const html = buildManualHTML(true);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const title = document.getElementById('manualTitle').value || 'manual';
  a.href = url;
  a.download = title.replace(/\s+/g,'-').toLowerCase() + '.html';
  a.click();
  URL.revokeObjectURL(url);
}

function clearAll() {
  if (!confirm('¿Limpiar todo el contenido?')) return;
  screens = [];
  activeScreenId = null;
  pinCounter = {};
  selectedAnnotationId = null;
  pinMode = false;
  renderScreensList();
  showEmpty();
}

// ============================
// UTILS
// ============================
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
